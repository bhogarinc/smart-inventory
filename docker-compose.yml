version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartinv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-smartinventory}
      POSTGRES_USER: ${DATABASE_USER:-smartinv_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-smartinv_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-smartinv_user} -d ${DATABASE_NAME:-smartinventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartinv-network

  redis:
    image: redis:7-alpine
    container_name: smartinv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartinv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: smartinv-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DATABASE_USER:-smartinv_user}:${DATABASE_PASSWORD:-smartinv_password_change_me}@postgres:5432/${DATABASE_NAME:-smartinventory}
      - DATABASE_URL_SYNC=postgresql://${DATABASE_USER:-smartinv_user}:${DATABASE_PASSWORD:-smartinv_password_change_me}@postgres:5432/${DATABASE_NAME:-smartinventory}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartinv-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: smartinv-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
      - REACT_APP_WS_URL=ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - smartinv-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartinv-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@smartinventory.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartinv-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartinv-network:
    driver: bridge
